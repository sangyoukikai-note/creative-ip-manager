<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative IP Manager</title>
</head>
<body>

    <script>
let count = 0;

function addCharacter() {
    count++;
    document.getElementById("character-count").innerText =
        "Characters: " + count;
}
</script>

    <h1>Creative IP Manager</h1>

<p id="character-count">Characters: 0</p>
    <p>Illustrations: 0</p>
    <p>Series: 0</p>

<button onclick="addCharacter()">Add Character</button>

</body>
</html>
